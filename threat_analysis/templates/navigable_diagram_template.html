<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagrammes de Menaces Navigables - Threat Model</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        .container {
            padding: 20px;
        }
        .breadcrumb {
            margin-bottom: 20px;
            font-size: 18px;
        }
        .breadcrumb a {
            text-decoration: none;
            color: #0078D4;
        }
        .breadcrumb a:hover {
            text-decoration: underline;
        }
        .diagram-container {
            text-align: center;
            border: 1px solid #ccc;
            padding: 10px;
            background-color: #ffffff;
        }
        .back-button {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 15px;
            background-color: #0078D4;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        {% if parent_link %}
            <a href="{{ parent_link }}" class="back-button">← Retour</a>
        {% endif %}

        <div class="breadcrumb">
            {% for name, link in breadcrumb %}
                {% set levels_up = (breadcrumb|length - 1) - loop.index0 %}
                {% set prefix = '../' * levels_up %}
                <a href="{{ prefix }}{{ link }}">{{ name }}</a>{% if not loop.last %} &gt; {% endif %}
            {% endfor %}
        </div>

        <div class="diagram-container">
            {{ svg_content|safe }}
        </div>
    </div>
</body>
</html>
